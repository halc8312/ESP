name: opencode

on:
  issue_comment:
    types: [created, edited]
  pull_request_review_comment:
    types: [created, edited]
  workflow_dispatch:

jobs:
  opencode:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association) &&
        (
          startsWith(github.event.comment.body, '/oc') ||
          startsWith(github.event.comment.body, '/opencode') ||
          contains(github.event.comment.body, ' /oc') ||
          contains(github.event.comment.body, ' /opencode') ||
          contains(github.event.comment.body, '\n/oc') ||
          contains(github.event.comment.body, '\n/opencode')
        )
      )
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run opencode
        uses: anomalyco/opencode/github@77fc88c8ade8e5a620ebbe1197f3a572d29ae91a
        env:
          STEPFUN_API_KEY: ${{ secrets.STEPFUN_API_KEY }}
        with:
          model: stepfun/step-3.5-flash-2603
          share: false
