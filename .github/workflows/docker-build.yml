name: Docker Build Validation

on:
  push:
    paths:
      - 'Dockerfile'
      - 'requirements.txt'
      - '.dockerignore'
  pull_request:
    paths:
      - 'Dockerfile'
      - 'requirements.txt'
      - '.dockerignore'

permissions:
  contents: read

jobs:
  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Measure build context size
        run: |
          echo "=== Build context size (total repo without .git) ==="
          du -sh --exclude='.git' .
          echo ""
          echo "=== Largest files in context ==="
          find . -not -path './.git/*' -type f -exec du -h {} + | sort -rh | head -15

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: esp-test:ci
          cache-from: type=gha
          cache-to: type=gha,mode=min

      - name: Report image size
        run: |
          echo "=== Docker image size ==="
          docker images esp-test:ci --format "{{.Size}}"
          echo ""
          echo "=== Image layer details ==="
          docker history esp-test:ci --no-trunc --format "table {{.Size}}\t{{.CreatedBy}}" | head -20

      - name: Smoke test - Python imports
        run: |
          docker run --rm esp-test:ci python -c "
          import flask; print('flask OK')
          import scrapling; print('scrapling OK')
          import playwright; print('playwright OK')
          print('All critical imports OK')
          "
