name: Docker Build Check

on:
  pull_request:
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - 'requirements.txt'
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - 'requirements.txt'

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: esp-test:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Report image size
        run: |
          echo "## Docker Image Size" >> "$GITHUB_STEP_SUMMARY"
          docker images esp-test:ci --format "{{.Size}}" | \
            xargs -I{} echo "**esp-test:ci** — {}" >> "$GITHUB_STEP_SUMMARY"

      - name: Smoke-test imports
        run: |
          docker run --rm esp-test:ci python -c "
          import flask, scrapling, playwright, gunicorn
          print('Core imports OK')
          "
