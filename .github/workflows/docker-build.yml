name: Docker Build Validation

on:
  push:
    paths:
      - 'Dockerfile'
      - 'requirements.txt'
      - '.dockerignore'
  pull_request:
    paths:
      - 'Dockerfile'
      - 'requirements.txt'
      - '.dockerignore'

jobs:
  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Measure build context size
        run: |
          echo "=== Build context estimation (respecting .dockerignore) ==="
          # Create a temporary tar to measure effective context size
          tar -czf /tmp/context.tar.gz \
            --exclude-from=<(sed '/^#/d; /^$/d; s/^!//' .dockerignore 2>/dev/null || true) \
            . 2>/dev/null || true
          CONTEXT_SIZE=$(du -sh /tmp/context.tar.gz | cut -f1)
          echo "Compressed build context: ${CONTEXT_SIZE}"
          rm -f /tmp/context.tar.gz

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: esp-test:ci
          cache-from: type=gha
          cache-to: type=gha,mode=min

      - name: Report image size
        run: |
          echo "=== Docker image size ==="
          docker images esp-test:ci --format "{{.Size}}"
          echo ""
          echo "=== Image layer details ==="
          docker history esp-test:ci --no-trunc --format "table {{.Size}}\t{{.CreatedBy}}" | head -20

      - name: Smoke test - Python imports
        run: |
          docker run --rm esp-test:ci python -c "
          import flask; print('flask OK')
          import scrapling; print('scrapling OK')
          import playwright; print('playwright OK')
          print('All critical imports OK')
          "
