# Active Render split topology reference.
# Keep this file aligned with the live Render services and env contract.

previews:
  generation: off

services:
  - type: web
    name: esp-web
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    autoDeployTrigger: off
    healthCheckPath: /healthz
    numInstances: 1
    maxShutdownDelaySeconds: 60
    disk:
      name: media
      mountPath: /var/data
      sizeGB: 10
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: esp-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: esp-keyvalue
          property: connectionString
      - key: SCRAPE_QUEUE_BACKEND
        value: rq
      - key: WEB_SCHEDULER_MODE
        value: disabled
      - key: SCHEMA_BOOTSTRAP_MODE
        value: auto
      - key: IMAGE_STORAGE_PATH
        value: /var/data/images
      - key: MEDIA_QUEUE_NAME
        value: media
      - key: TRANSLATOR_BACKEND
        value: argos
      # Set OPENAI_API_KEY in the Render dashboard (sync: false) if / when
      # TRANSLATOR_BACKEND is switched to ``openai``. Also set the same key
      # on esp-worker so both processes can instantiate the client.
      - key: OPENAI_API_KEY
        sync: false
      - key: BG_REMOVAL_BACKEND
        value: rembg
      - key: BG_REMOVAL_INTERNAL_SECRET
        sync: false
      - key: SELECTOR_ALERT_WEBHOOK_URL
        sync: false

  - type: worker
    name: esp-worker
    runtime: docker
    plan: standard
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: python worker.py
    autoDeployTrigger: off
    numInstances: 1
    maxShutdownDelaySeconds: 300
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: esp-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: esp-keyvalue
          property: connectionString
      - key: SCRAPE_QUEUE_BACKEND
        value: rq
      - key: MEDIA_QUEUE_NAME
        value: media
      - key: TRANSLATOR_BACKEND
        value: argos
      - key: OPENAI_API_KEY
        sync: false
      - key: BG_REMOVAL_BACKEND
        value: rembg
      - key: BG_REMOVAL_INTERNAL_SECRET
        sync: false
      # Render's private network exposes services under an auto-generated
      # hostname of the form ``<service-name>-<suffix>`` (e.g. ``esp-web-ne5j``)
      # — NOT the bare service name. We therefore resolve the hostname via
      # ``fromService.property: host`` so Render injects the correct value
      # at deploy time. The public HTTPS port 10000 is blocked on the private
      # network, so esp-web also binds a second port (INTERNAL_PORT=8080)
      # inside the container for worker -> web traffic.
      - key: WEB_INTERNAL_HOST
        fromService:
          type: web
          name: esp-web
          property: host
      - key: WEB_INTERNAL_PORT
        value: "8080"
      - key: WORKER_ENABLE_SCHEDULER
        value: "1"
      - key: WARM_BROWSER_POOL
        value: "1"
      - key: ENABLE_SHARED_BROWSER_RUNTIME
        value: "1"
      - key: BROWSER_POOL_WARM_SITES
        value: mercari
      - key: MERCARI_USE_BROWSER_POOL_DETAIL
        value: "1"
      - key: MERCARI_PATROL_USE_BROWSER_POOL
        value: "1"
      - key: SNKRDUNK_USE_BROWSER_POOL_DYNAMIC
        value: "1"
      - key: WORKER_RECONCILE_STALLED_JOBS_ON_STARTUP
        value: "1"
      - key: WORKER_PROCESS_SELECTOR_REPAIRS_ON_STARTUP
        value: "0"
      - key: WORKER_SELECTOR_REPAIR_LIMIT
        value: "1"
      - key: SELECTOR_REPAIR_MIN_SCORE
        value: "90"
      - key: SELECTOR_REPAIR_MIN_CANARIES
        value: "2"
      - key: SELECTOR_REPAIR_CANARY_URLS_MERCARI_DETAIL
        sync: false
      - key: SELECTOR_REPAIR_CANARY_URLS_SNKRDUNK_DETAIL
        sync: false
      - key: SELECTOR_ALERT_WEBHOOK_URL
        sync: false
      - key: WORKER_BACKLOG_WARN_COUNT
        value: "25"
      - key: WORKER_BACKLOG_WARN_AGE_SECONDS
        value: "900"
      - key: OPERATIONAL_ALERT_WEBHOOK_URL
        sync: false

  - type: keyvalue
    name: esp-keyvalue
    plan: starter
    maxmemoryPolicy: noeviction
    ipAllowList: []

databases:
  - name: esp-postgres
    plan: basic-1gb
    databaseName: esp_production
    user: esp_user
    ipAllowList: []
