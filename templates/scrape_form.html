{% extends "base.html" %}

{% block title %}商品抽出{% endblock %}
{% block header_title %}商品抽出{% endblock %}

{% block content %}
<div class="page-header">
    <h1>商品抽出</h1>
</div>

<div class="content-card">
    <!-- 方法1: URL直接指定 -->
    <div class="content-card-header">
        <h3>URLから抽出</h3>
    </div>
    <div class="content-card-body">
        <form method="POST" action="{{ url_for('scrape_run') }}" class="scrape-form-compact">
            <div class="form-row">
                <div class="form-group form-group--keyword">
                    <input type="url" name="target_url"
                        placeholder="https://... メルカリ / ラクマ / Yahoo / 駿河屋 / オフモール / ヤフオク / SNKRDUNK"
                        required inputmode="url" autocomplete="url">
                </div>
                <div class="form-group form-group--submit">
                    <button type="submit" class="btn btn-primary">URLから商品を抽出</button>
                </div>
            </div>
        </form>
    </div>

    <!-- 方法2: 検索条件 -->
    <div class="content-card-header" style="border-top: 1px solid var(--border-color);">
        <h3>条件で検索して抽出</h3>
    </div>
    <div class="content-card-body">
        <form method="POST" action="{{ url_for('scrape_run') }}" class="scrape-form-compact">
            <div class="form-row">
                <div class="form-group">
                    <label>サイト</label>
                    <select name="site">
                        <option value="mercari">メルカリ</option>
                        <option value="yahoo">Yahoo!ショッピング</option>
                        <option value="rakuma">ラクマ</option>
                        <option value="surugaya">駿河屋</option>
                        <option value="offmall">オフモール</option>
                        <option value="yahuoku">ヤフオク</option>
                        <option value="snkrdunk">SNKRDUNK</option>
                    </select>
                </div>
                <div class="form-group form-group--keyword">
                    <label>キーワード</label>
                    <input type="text" name="keyword" value="スニーカー" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label>件数</label>
                    <select name="limit">
                        <option value="10">10件</option>
                        <option value="20">20件</option>
                        <option value="50">50件</option>
                        <option value="100">100件</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>価格 min</label>
                    <input type="number" name="price_min" inputmode="numeric" min="0" placeholder="¥0">
                </div>
                <div class="form-group">
                    <label>価格 max</label>
                    <input type="number" name="price_max" inputmode="numeric" min="0" placeholder="上限なし">
                </div>
                <div class="form-group form-group--submit">
                    <button type="submit" class="btn btn-primary" aria-label="商品を抽出する">商品を抽出する</button>
                </div>
            </div>
            <details class="filter-advanced" style="margin-top: 8px;">
                <summary>詳細オプション（ソート順・カテゴリID）</summary>
                <div class="filter-advanced-body" style="margin-top: 10px;">
                    <div class="form-group">
                        <label>ソート順</label>
                        <select name="sort">
                            <option value="created_desc">新着順</option>
                            <option value="price_asc">価格：安い順</option>
                            <option value="price_desc">価格：高い順</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>カテゴリID（任意）</label>
                        <input type="text" name="category" placeholder="例：1" inputmode="numeric">
                    </div>
                </div>
            </details>
        </form>
    </div>
</div>

<section id="scrapePreviewSection" class="content-card scrape-preview-section" hidden>
    <div class="content-card-header">
        <h3>抽出プレビュー</h3>
    </div>
    <div class="content-card-body">
        <div id="scrapePreviewFlash" class="scrape-preview-flash" hidden></div>

        <div class="scrape-preview-toolbar">
            <div id="scrapePreviewSummary" class="scrape-preview-summary text-muted">
                抽出結果がここに表示されます。
            </div>
            <div class="scrape-preview-actions">
                <label class="scrape-preview-select-all">
                    <input type="checkbox" id="scrapePreviewSelectAll">
                    すべて選択
                </label>
                <button type="button" id="registerSelectedButton" class="btn btn-primary" disabled>選択した商品を登録</button>
            </div>
        </div>

        <div id="scrapePreviewMeta" class="scrape-preview-meta"></div>
        <div id="scrapePreviewGrid" class="scrape-preview-grid"></div>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script>
(function () {
    "use strict";

    var activePreviewJob = null;
    var previewSection = document.getElementById('scrapePreviewSection');
    var previewGrid = document.getElementById('scrapePreviewGrid');
    var previewMeta = document.getElementById('scrapePreviewMeta');
    var previewSummary = document.getElementById('scrapePreviewSummary');
    var previewFlash = document.getElementById('scrapePreviewFlash');
    var selectAllCheckbox = document.getElementById('scrapePreviewSelectAll');
    var registerButton = document.getElementById('registerSelectedButton');
    var pollTimer = null;

    function createOverlay() {
        var overlay = document.createElement('div');
        overlay.id = 'loadingOverlay';
        overlay.className = 'loading-overlay';
        overlay.innerHTML = '<div class="loading-content"><div class="loading-spinner"></div><p class="loading-message" id="loadingMessage">商品を抽出中です...</p><p class="loading-sub" id="loadingSub">しばらくお待ちください...</p></div>';
        document.body.appendChild(overlay);
        return overlay;
    }

    function getOverlay() {
        return document.getElementById('loadingOverlay');
    }

    function removeOverlay() {
        var overlay = getOverlay();
        if (overlay) {
            overlay.remove();
        }
    }

    function updateOverlay(message, subMessage) {
        var overlay = getOverlay();
        if (!overlay) return;
        var messageEl = document.getElementById('loadingMessage');
        var subEl = document.getElementById('loadingSub');
        if (messageEl) messageEl.textContent = message;
        if (subEl) subEl.textContent = subMessage || '';
    }

    function showFlash(message, type) {
        previewFlash.hidden = false;
        previewFlash.textContent = message;
        previewFlash.className = 'scrape-preview-flash';
        if (type) {
            previewFlash.classList.add(type);
        }
    }

    function clearFlash() {
        previewFlash.hidden = true;
        previewFlash.textContent = '';
        previewFlash.className = 'scrape-preview-flash';
    }

    function getItemImageUrl(item) {
        if (Array.isArray(item.image_urls) && item.image_urls.length > 0) {
            return item.image_urls[0];
        }
        return '';
    }

    function formatPrice(value) {
        if (value === null || value === undefined || value === '') {
            return '価格未取得';
        }
        return '¥' + Number(value).toLocaleString('ja-JP');
    }

    function updateRegisterButtonState() {
        var checkedCount = previewGrid.querySelectorAll('.scrape-preview-checkbox:checked').length;
        registerButton.disabled = !activePreviewJob || checkedCount === 0;
    }

    function renderPreview(result) {
        var items = result.items || [];
        activePreviewJob = {
            jobId: result.job_id || activePreviewJob.jobId,
            registerUrl: activePreviewJob.registerUrl,
            items: items
        };

        previewSection.hidden = false;
        clearFlash();

        previewSummary.textContent = '抽出 ' + items.length + '件 / 除外 ' + (result.excluded_count || 0) + '件';
        previewMeta.innerHTML = '';

        if (result.search_url) {
            var metaLink = document.createElement('a');
            metaLink.href = result.search_url;
            metaLink.target = '_blank';
            metaLink.rel = 'noopener';
            metaLink.textContent = '検索URLを開く';
            previewMeta.appendChild(metaLink);
        }

        previewGrid.innerHTML = '';
        selectAllCheckbox.checked = true;

        if (items.length === 0) {
            var empty = document.createElement('p');
            empty.className = 'text-muted';
            empty.textContent = '条件に一致する商品はありませんでした。';
            previewGrid.appendChild(empty);
            updateRegisterButtonState();
            previewSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
            return;
        }

        items.forEach(function (item, index) {
            var card = document.createElement('label');
            card.className = 'scrape-preview-card';

            var checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.className = 'scrape-preview-checkbox';
            checkbox.value = String(index);
            checkbox.checked = true;
            checkbox.addEventListener('change', function () {
                updateRegisterButtonState();
                if (!checkbox.checked) {
                    selectAllCheckbox.checked = false;
                }
            });

            var imageWrap = document.createElement('div');
            imageWrap.className = 'scrape-preview-image';
            var imageUrl = getItemImageUrl(item);
            if (imageUrl) {
                var img = document.createElement('img');
                img.src = imageUrl;
                img.alt = item.title || 'preview image';
                imageWrap.appendChild(img);
            } else {
                imageWrap.textContent = 'No Image';
                imageWrap.classList.add('is-empty');
            }

            var body = document.createElement('div');
            body.className = 'scrape-preview-card-body';

            var title = document.createElement('div');
            title.className = 'scrape-preview-title';
            title.textContent = item.title || '(タイトルなし)';

            var price = document.createElement('div');
            price.className = 'scrape-preview-price';
            price.textContent = formatPrice(item.price);

            var status = document.createElement('div');
            status.className = 'scrape-preview-status';
            status.textContent = item.status || 'ステータス不明';

            body.appendChild(title);
            body.appendChild(price);
            body.appendChild(status);

            if (item.url) {
                var link = document.createElement('a');
                link.href = item.url;
                link.target = '_blank';
                link.rel = 'noopener';
                link.textContent = '商品ページを開く';
                link.className = 'scrape-preview-link';
                body.appendChild(link);
            }

            card.appendChild(checkbox);
            card.appendChild(imageWrap);
            card.appendChild(body);
            previewGrid.appendChild(card);
        });

        updateRegisterButtonState();
        previewSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function pollPreviewStatus(statusUrl) {
        fetch(statusUrl)
            .then(function (response) {
                if (!response.ok) {
                    throw new Error('ステータス取得に失敗しました');
                }
                return response.json();
            })
            .then(function (data) {
                if (data.status === 'queued') {
                    updateOverlay(
                        'キュー待機中です',
                        data.queue_position ? data.queue_position + '番目で待機しています...' : 'しばらくお待ちください...'
                    );
                    pollTimer = setTimeout(function () { pollPreviewStatus(statusUrl); }, 2000);
                    return;
                }

                if (data.status === 'running') {
                    updateOverlay('商品を抽出中です...', '経過時間: ' + data.elapsed_seconds + '秒');
                    pollTimer = setTimeout(function () { pollPreviewStatus(statusUrl); }, 2000);
                    return;
                }

                if (data.status === 'failed') {
                    removeOverlay();
                    showFlash('商品抽出に失敗しました: ' + (data.error || '不明なエラー'), 'error');
                    previewSection.hidden = false;
                    return;
                }

                removeOverlay();
                var result = data.result || {};
                result.job_id = data.job_id;
                renderPreview(result);
            })
            .catch(function (error) {
                removeOverlay();
                showFlash(error.message || '通信エラーが発生しました', 'error');
                previewSection.hidden = false;
            });
    }

    function submitPreviewForm(form) {
        clearFlash();
        if (pollTimer) {
            clearTimeout(pollTimer);
            pollTimer = null;
        }

        createOverlay();
        updateOverlay('商品を抽出中です...', 'しばらくお待ちください...');

        var formData = new FormData(form);
        formData.append('response_mode', 'preview');

        fetch(form.action, {
            method: 'POST',
            body: formData
        })
            .then(function (response) {
                if (!response.ok) {
                    throw new Error('商品抽出ジョブの作成に失敗しました');
                }
                return response.json();
            })
            .then(function (data) {
                activePreviewJob = {
                    jobId: data.job_id,
                    registerUrl: data.register_url,
                    items: []
                };
                pollPreviewStatus(data.status_url);
            })
            .catch(function (error) {
                removeOverlay();
                showFlash(error.message || '送信に失敗しました', 'error');
                previewSection.hidden = false;
            });
    }

    function getSelectedIndices() {
        return Array.from(previewGrid.querySelectorAll('.scrape-preview-checkbox:checked')).map(function (checkbox) {
            return Number(checkbox.value);
        });
    }

    registerButton.addEventListener('click', function () {
        if (!activePreviewJob) {
            return;
        }

        var selectedIndices = getSelectedIndices();
        if (selectedIndices.length === 0) {
            showFlash('登録する商品を選択してください。', 'error');
            return;
        }

        registerButton.disabled = true;
        fetch(activePreviewJob.registerUrl, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                job_id: activePreviewJob.jobId,
                selected_indices: selectedIndices
            })
        })
            .then(function (response) {
                return response.json().then(function (data) {
                    if (!response.ok) {
                        throw new Error(data.error || '登録に失敗しました');
                    }
                    return data;
                });
            })
            .then(function (data) {
                showFlash(
                    '登録完了: ' + data.registered_count + '件（新規 ' + data.new_count + ' / 更新 ' + data.updated_count + '）',
                    'success'
                );
            })
            .catch(function (error) {
                showFlash(error.message || '登録に失敗しました', 'error');
            })
            .finally(function () {
                updateRegisterButtonState();
            });
    });

    selectAllCheckbox.addEventListener('change', function () {
        previewGrid.querySelectorAll('.scrape-preview-checkbox').forEach(function (checkbox) {
            checkbox.checked = selectAllCheckbox.checked;
        });
        updateRegisterButtonState();
    });

    document.querySelectorAll('.scrape-form-compact').forEach(function (form) {
        form.addEventListener('submit', function (event) {
            if (!window.fetch || !window.FormData) {
                createOverlay();
                updateOverlay('商品を抽出中です...', 'しばらくお待ちください...');
                return;
            }
            event.preventDefault();
            submitPreviewForm(form);
        });
    });
})();
</script>
{% endblock %}
